# ==============================================================================
# Ubuntu 最小安装服务器 - 基础开发环境依赖包
#
# 用途：为最小化安装的 Ubuntu 服务器补充开发/编译所需的完整依赖
# 适用场景：
# - 云服务器最小安装
# - Docker 容器基础镜像
# - 最小化安装的物理服务器
# ==============================================================================

# ---- Ubuntu 版本和架构 ----

# Ubuntu 版本（可以是版本号或代号）
ubuntu_version = 24.04

# 架构
architecture = amd64

# 镜像源
mirror = http://mirrors.aliyun.com/ubuntu

# ============================================================================
# 第一层：核心编译工具（必需）
# ============================================================================

# 编译工具链（最核心）
# build-essential 是元包，包含：
# - gcc: GNU C 编译器
# - g++: GNU C++ 编译器
# - make: 构建工具
# - dpkg-dev: Debian 包开发工具
# - libc6-dev: C 标准库头文件
build_tools = build-essential

# ============================================================================
# 第二层：基础开发工具（强烈推荐）
# ============================================================================

# 版本控制和代码管理
# - git: 分布式版本控制（必需）
vcs_tools = git

# 文本编辑器
# - vim: 经典编辑器
editors = vim

# 网络下载和传输
# - curl: 数据传输工具（很多脚本依赖）
# - wget: 文件下载工具
# - ca-certificates: SSL 证书（HTTPS 必需）
network_tools = curl wget ca-certificates

# 压缩解压工具
# - unzip: ZIP 解压
# - zip: ZIP 压缩
# - p7zip-full: 7z 格式支持
# - xz-utils: xz 压缩工具
archive_tools = unzip zip p7zip-full xz-utils

# ============================================================================
# 第三层：系统工具（推荐）
# ============================================================================

# 系统监控和管理
# - htop: 进程监控（比 top 更友好）
# - tree: 目录树显示
# - lsof: 列出打开的文件
# - strace: 系统调用跟踪（调试用）
# - ltrace: 库调用跟踪（调试用）
system_tools = htop tree lsof strace ltrace

# ============================================================================
# 第四层：Python 编译依赖
# ============================================================================

# Python 编译依赖（必需）
# - libssl-dev: SSL/TLS 支持（必需，pip https 下载）
# - zlib1g-dev: 压缩支持（必需）
# - libffi-dev: FFI 支持（必需，ctypes 模块）
# - libsqlite3-dev: SQLite 支持（必需）
python_build_essential = libssl-dev zlib1g-dev libffi-dev libsqlite3-dev

# Python 编译依赖（推荐）
# - libreadline-dev: readline 支持（交互式 shell 历史）
# - libbz2-dev: bz2 压缩支持
# - libncurses5-dev: ncurses 支持
# - libncursesw5-dev: ncurses 宽字符支持
# - liblzma-dev: xz 压缩支持
python_build_recommended = libreadline-dev libbz2-dev libncurses5-dev libncursesw5-dev liblzma-dev

# Python 编译依赖（可选）
# - tk-dev: Tkinter GUI 支持
# - libxml2-dev: XML 处理
# - libxslt1-dev: XSLT 处理
# - libgdbm-dev: GDBM 数据库
# - uuid-dev: UUID 支持
python_build_optional = tk-dev libxml2-dev libxslt1-dev libgdbm-dev uuid-dev

# ============================================================================
# 第五层：Node.js 开发依赖
# ============================================================================

# Node.js 编译依赖（如果需要从源码编译 Node.js）
# - python3: Node.js 编译需要
# - g++: C++ 编译器
# - make: 构建工具
# 注意：如果使用 fnm/nvm 安装预编译版本，这些不是必需的
nodejs_build_deps = python3 g++ make

# ============================================================================
# 第六层：其他常用开发工具
# ============================================================================

# 构建工具
# - pkg-config: 编译配置工具（很多库依赖）
# - autoconf: 自动配置脚本
# - automake: 自动生成 Makefile
# - libtool: 通用库支持脚本
dev_tools = pkg-config autoconf automake libtool

# ============================================================================
# 第七层：常用开发库（按需选择）
# ============================================================================

# 数据库开发库
# - libmysqlclient-dev: MySQL 客户端开发库
# - libpq-dev: PostgreSQL 客户端开发库
# database_dev = libmysqlclient-dev libpq-dev

# 图形/图像处理库
# - libpng-dev: PNG 图像库
# - libjpeg-dev: JPEG 图像库
# - libfreetype6-dev: 字体渲染库
# graphics_dev = libpng-dev libjpeg-dev libfreetype6-dev

# ============================================================================
# 软件包列表（下载脚本使用）
# ============================================================================

# 完整软件包列表（自动从上方各层级合并）
# 格式：包名 或 包名/版本
packages = build-essential git vim curl wget ca-certificates unzip zip p7zip-full xz-utils htop tree lsof strace ltrace libssl-dev zlib1g-dev libffi-dev libsqlite3-dev libreadline-dev libbz2-dev libncurses5-dev libncursesw5-dev liblzma-dev pkg-config autoconf automake libtool

# ============================================================================
# 下载选项
# ============================================================================

# 下载目录
download_dir = ubuntu-base-dev-deps

# 打包文件名
archive_file = ubuntu-base-dev-deps.tar.gz

# 是否自动打包
auto_package = true

# 打包后是否删除源文件
clean_after_package = false
