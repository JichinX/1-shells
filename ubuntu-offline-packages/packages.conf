# ==============================================================================
# Ubuntu/Debian 离线包配置文件
#
# 用途：定义需要离线下载的 Ubuntu/Debian 软件包
# 用法：bash download-packages.sh
# ==============================================================================

# ---- 基础配置 ----

# 下载目录（相对或绝对路径）
download_dir = ubuntu-packages

# 打包文件名
archive_file = ubuntu-offline-packages.tar.gz

# Ubuntu 版本和架构
# 版本：可以是版本号（22.04）或代号（jammy）
# 支持的版本：24.04, 22.04, 20.04, 18.04 等
# 设为 "auto" 可自动检测（如果在 Ubuntu 系统上运行）
ubuntu_version = 22.04

# 架构：amd64, arm64, armhf
architecture = amd64

# Ubuntu 镜像源
# 官方：http://archive.ubuntu.com/ubuntu
# 阿里云：http://mirrors.aliyun.com/ubuntu
# 清华：https://mirrors.tuna.tsinghua.edu.cn/ubuntu
mirror = http://mirrors.aliyun.com/ubuntu

# ---- 软件包列表 ----

# 直接指定包名（空格分隔）
# 格式：包名 或 包名/版本
# 示例：unzip zip curl wget
packages = unzip zip curl wget git vim htop tree

# ---- 打包选项 ----

# 是否自动打包（true/false）
auto_package = true

# 是否在打包后删除源文件（true/false）
clean_after_package = false
