# ==============================================================================
# Ubuntu/Debian 离线依赖包配置文件
#
# 用途：定义需要离线下载的 Ubuntu/Debian 软件包
# 用法：bash download-packages.sh
# ==============================================================================

# ---- 基础配置 ----

# 下载目录（相对或绝对路径）
download_dir = ubuntu-packages

# 打包文件名
archive_file = ubuntu-offline-packages.tar.gz

# Ubuntu 版本代号（用于确定包版本）
# 常见版本：jammy (22.04), focal (20.04), bionic (18.04)
# 留空则自动检测或使用当前系统版本
ubuntu_codename = 

# ---- 软件包列表 ----

# 基础工具包（空格分隔）
# 这些是常用的基础工具
basic_packages = unzip zip curl wget git vim htop tree

# 开发工具包（空格分隔）
# 编译和开发相关工具
dev_packages = build-essential cmake pkg-config autoconf automake

# 网络工具包（空格分隔）
network_packages = net-tools iputils-ping openssh-client

# Python 开发包（空格分隔）
python_packages = python3 python3-pip python3-venv python3-dev

# Node.js 相关（空格分隔）
# 注意：建议使用 fnm/nvm 管理 Node.js，这里只安装基础依赖
nodejs_packages = nodejs npm

# ---- 下载选项 ----

# 是否下载依赖包（true/false）
# true: 下载包及其所有依赖（推荐，确保离线安装成功）
# false: 只下载指定的包（可能缺少依赖）
download_dependencies = true

# 是否下载推荐包（true/false）
download_recommends = false

# 是否下载建议包（true/false）
download_suggests = false

# ---- 打包选项 ----

# 是否自动打包（true/false）
auto_package = true

# 是否在打包后删除源文件（true/false）
clean_after_package = false
