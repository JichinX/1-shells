# ==============================================================================
# MSYS2 离线资源配置文件
#
# 用法：.\download-resources.ps1 -OutputPath ".\offline-resources"
# 也可直接运行脚本使用默认配置
# ==============================================================================

# ---- 基础配置 ----

# MSYS2 架构: x86_64 | i686
arch = x86_64

# 输出目录（相对或绝对路径）
output = .\offline-resources

# MSYS2 安装路径（仅用于安装脚本）
install_path = C:\msys64

# ---- 下载源配置 ----

# MSYS2 镜像源
# 官方: https://repo.msys2.org/distrib
# 清华: https://mirrors.tuna.tsinghua.edu.cn/msys2/distrib
# 中科大: https://mirrors.ustc.edu.cn/msys2/distrib
msys2_mirror = https://repo.msys2.org/distrib

# GitHub 镜像（用于下载 Oh My Zsh、Starship 等）
# 官方: https://github.com
# 国内镜像: https://ghproxy.com/https://github.com
github_mirror = https://github.com

# ---- 软件包配置 ----

# 要下载的 MSYS2 软件包（空格或逗号分隔）
# 基础包会自动包含
packages = git curl wget vim nano zsh tar zip unzip man-db bat fd ripgrep fzf zoxide

# UCRT64 特定包（需要 mingw-w64-ucrt-x86_64- 前缀）
ucrt64_packages = eza

# 是否下载所有软件包（慎用，体积巨大）
download_all_packages = false

# ---- 工具配置 ----

# 是否下载 Oh My Zsh
download_ohmyzsh = true

# Zsh 插件
zsh_plugins = zsh-autosuggestions, zsh-syntax-highlighting

# 是否下载 Starship
download_starship = true

# 是否下载 Nerd Font（JetBrains Mono）
download_font = true

# ---- 镜像源配置（离线安装后使用）----

# 配置 MSYS2 使用国内镜像源（安装后首次更新更快）
# 可选: tuna | ustc | official
default_mirror = tuna

# ---- 生成选项 ----

# 是否生成部署脚本
generate_scripts = true

# 是否生成资源清单（manifest.json）
generate_manifest = true
