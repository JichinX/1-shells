# ==============================================================================
# VSCode 离线资源下载配置文件
#
# 用法：./download.sh --config config.conf
# CLI 参数优先级高于配置文件
# 以 # 开头的行为注释，空行会被忽略
# ==============================================================================

# ---- 基础配置 ----

# 服务器架构: x64 | arm64
arch = x64

# 输出目录 (相对于脚本所在目录或绝对路径)
output = ./vscode-offline-bundle

# HTTP 代理 (留空则不使用)
# proxy = http://127.0.0.1:7890

# ---- VSCode Server ----

# VSCode 版本 (如 1.98.2)
# 留空则自动检测本地安装的版本
vscode_version = 

# VSCode Commit ID (优先级高于版本号)
# 留空则通过版本号查询或自动检测
commit_id = 

# 是否下载 VSCode Server
download_vscode_server = true

# ---- code-server ----

# code-server 版本 (如 4.112.0)
# 留空则自动获取最新版本
code_server_version = 

# 是否下载 code-server
download_code_server = true

# ---- openvscode-server ----

# openvscode-server 版本 (如 1.109.5)
# 留空则自动获取最新版本
openvscode_server_version = 

# 是否下载 openvscode-server
download_openvscode_server = true

# ---- 扩展配置 ----

# 扩展列表 (每行一个，格式: publisher.extension-name)
# 注释和空行会被忽略
extensions << EOF
ms-vscode-remote.remote-ssh
ms-vscode-remote.remote-ssh-edit
ms-python.python
dbaeumer.vscode-eslint
esbenp.prettier-vscode
formulahendry.code-runner
ms-vscode.cpptools
rust-lang.rust-analyzer
tamasfe.even-better-toml
redhat.java
ms-azuretools.vscode-docker
yzhang.markdown-all-in-one
gruntfuggly.todo-tree
eamodio.gitlens
mhutchie.git-graph
EOF
