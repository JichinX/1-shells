# ==============================================================================
# PowerShell 模块离线下载配置文件
#
# 用法：.\download-modules.ps1 -ConfigFile ".\modules.conf"
# 也可直接运行脚本使用默认配置
# ==============================================================================

# ---- 基础配置 ----

# 输出目录（相对或绝对路径）
output = .\offline-modules

# PowerShell 版本（用于兼容性检查）
# 可选: 5.1, 7.0, 7.1, 7.2, 7.3, 7.4, latest
powershell_version = 5.1

# ---- 模块源配置 ----

# 默认模块源
# 官方: PSGallery
# 国内镜像: 可配置私有 NuGet 源
repository = PSGallery

# 是否信任所有模块源（谨慎使用）
trust_repository = true

# ---- 模块列表 ----

# 基础工具模块（空格或逗号分隔）
# PowerShellGet 和 PackageManagement 是模块管理基础，会自动包含
basic_modules = PSReadLine, posh-git, Terminal-Icons

# 开发工具模块
dev_modules = Pester, PSScriptAnalyzer, platyPS

# 云服务模块（按需启用）
# Azure 模块较大，建议单独下载
cloud_modules = AWS.Tools.Common

# 其他常用模块
utility_modules = ImportExcel, Pscx

# ---- 下载选项 ----

# 是否下载模块依赖
include_dependencies = true

# 是否下载预发布版本
allow_prerelease = false

# 下载的模块版本范围
# latest: 最新版本
# specific: 指定版本（需要在下方配置）
version_policy = latest

# 指定模块版本（仅在 version_policy = specific 时生效）
# 格式: 模块名=版本号
# PSReadLine_version = 2.2.6
# Pester_version = 5.4.0

# ---- 生成选项 ----

# 是否生成模块清单
generate_manifest = true

# 是否生成安装脚本
generate_install_script = true

# 是否验证模块签名
verify_signature = false
