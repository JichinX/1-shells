# ==============================================================================
# JetBrains 离线资源下载配置文件
#
# 用法：./download.sh --config config.conf
# CLI 参数优先级高于配置文件
# ==============================================================================

# ---- 基础配置 ----

# 服务器架构: x64 | arm64
arch = x64

# 输出目录 (相对于脚本所在目录或绝对路径)
output = ./jetbrains-offline-bundle

# HTTP 代理 (留空则不使用)
# proxy = http://127.0.0.1:7890

# ---- JetBrains 产品配置 ----

# 要下载的 IDE 产品（用逗号分隔）
# 产品代码:
#   IU  - IntelliJ IDEA Ultimate
#   IC  - IntelliJ IDEA Community
#   PCP - PyCharm Professional
#   PCC - PyCharm Community
#   WS  - WebStorm
#   GO  - GoLand
#   CL  - CLion
#   PS  - PhpStorm
#   RD  - Rider
#   DB  - DataGrip
products = IU,PCP,WS

# IDE 版本 (留空则自动获取最新稳定版)
# 例如: 2024.1, 2024.1.1
ide_version =

# 是否下载 EAP 版本
include_eap = false

# ---- JetBrains Client 配置 ----

# 客户端平台（用逗号分隔，用于不同开发者的本地机器）
# 可选: linux-x64, linux-arm64, windows-x64, mac-x64, mac-arm64
client_platforms = linux-x64,windows-x64,mac-x64,mac-arm64

# 是否下载 JetBrains Client
download_client = true

# ---- JetBrains Runtime (JBR) 配置 ----

# 是否下载 JBR
download_jbr = true

# ---- 其他配置 ----

# 是否下载 KEYS 文件（PGP 公钥验证）
download_keys = true

# 是否生成服务器端部署脚本
generate_deploy_script = true
