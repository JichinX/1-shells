# ==============================================================================
# Python 编译依赖包列表
#
# 这些是编译 Python 源码所需的系统依赖包
# 用途：在离线 Ubuntu 环境中安装这些依赖，然后才能编译安装 Python
# ==============================================================================

# ---- Ubuntu 版本和架构 ----

# Ubuntu 版本（可以是版本号或代号）
# 22.04 / jammy, 20.04 / focal, 18.04 / bionic
ubuntu_version = 22.04

# 架构
architecture = amd64

# 镜像源
mirror = http://mirrors.aliyun.com/ubuntu

# ---- Python 编译依赖 ----

# 核心编译工具
# build-essential 是元包，包含以下工具：
# - gcc: GNU C 编译器
# - g++: GNU C++ 编译器
# - make: 构建工具
# - dpkg-dev: Debian 包开发工具
# - libc6-dev: C 标准库头文件
build_tools = build-essential

# 必需的依赖（Python 核心功能）
# - libssl-dev: SSL/TLS 支持（必需）
# - zlib1g-dev: 压缩支持（必需）
# - libffi-dev: FFI 支持（必需，ctypes 模块）
# - libsqlite3-dev: SQLite 支持（必需）
essential_deps = libssl-dev zlib1g-dev libffi-dev libsqlite3-dev

# 推荐的依赖（增强功能）
# - libreadline-dev: readline 支持（交互式 shell）
# - libbz2-dev: bz2 压缩支持
# - libncurses5-dev: ncurses 支持
# - liblzma-dev: xz 压缩支持
recommended_deps = libreadline-dev libbz2-dev libncurses5-dev libncursesw5-dev liblzma-dev

# 可选的依赖（特定功能）
# - tk-dev: Tkinter GUI 支持
# - libxml2-dev, libxslt1-dev: XML/XSLT 处理
# - libgdbm-dev: GDBM 数据库
# - uuid-dev: UUID 支持
optional_deps = tk-dev libxml2-dev libxslt1-dev libgdbm-dev uuid-dev

# ---- 下载选项 ----

# 下载目录
download_dir = python-build-deps

# 打包文件名
archive_file = python-build-deps.tar.gz
