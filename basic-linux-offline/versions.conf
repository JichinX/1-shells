# ==============================================================================
# Linux 离线开发工具配置文件
#
# 用法：bash download.sh
# 或：bash download.sh -c /path/to/custom.conf
# ==============================================================================

# ---- 基础配置 ----

# 下载目录（相对或绝对路径）
download_dir = offline-packages

# 打包文件名
archive_file = linux-offline-dev-tools.tar.gz

# ---- Python 配置 ----

# Python 版本列表（空格分隔）
# 格式：主版本.次版本.修订版本
# 示例：3.12.0 3.11.8 3.10.13
python_versions = 3.12.13 3.11.15

# Python 源码下载源
# 官方：https://www.python.org/ftp/python
# 国内镜像：https://npm.taobao.org/mirrors/python（已停用）
# 注意：目前建议使用官方源
python_mirror = https://www.python.org/ftp/python

# ---- Node.js 配置 ----

# Node.js 版本列表（空格分隔）
# 格式：主版本.次版本.修订版本
# 示例：20.11.0 18.19.0 16.20.2
node_versions = 24.14.1

# Node.js 二进制包下载源
# 官方：https://nodejs.org/dist
# 国内镜像：https://npmmirror.com/mirrors/node
node_mirror = https://nodejs.org/dist

# Node.js 架构
# 可选：linux-x64, linux-arm64
node_arch = linux-x64

# ---- pyenv 配置 ----

# pyenv 仓库地址
pyenv_repo = https://github.com/pyenv/pyenv.git

# 是否使用浅克隆（减小体积）
# 注意：Ubuntu 24.04 需要最新的 python-build
# 如果遇到版本问题，请删除旧的 pyenv-offline.tar.gz 重新下载
pyenv_shallow_clone = true

# pyenv 版本（可选）
# 留空则使用最新版本
# 指定版本可以确保兼容性，例如：v2.4.0
pyenv_version = v2.6.26

# ---- fnm 配置 ----

# fnm 下载地址
fnm_url = https://github.com/Schniz/fnm/releases/latest/download/fnm-linux.zip

# ---- 下载选项 ----

# 是否下载 Python（true/false）
download_python = true

# 是否下载 Node.js（true/false）
download_nodejs = true

# 是否下载 pyenv（true/false）
download_pyenv = true

# 是否下载 fnm（true/false）
download_fnm = true

# ---- 打包选项 ----

# 是否自动打包（true/false）
auto_package = true

# 是否在打包后删除源文件（true/false）
# 注意：设为 false 会保留解压后的目录
clean_after_package = false
